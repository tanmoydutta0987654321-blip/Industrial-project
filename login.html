<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login1</title>
    <link rel="stylesheet" href="login1.css">
    <style>
        /* Modern Success Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            animation: modalFadeIn 0.3s ease-out;
        }

        .modal-body {
            background: #ffffff;
            width: 380px;
            padding: 40px 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            transform: scale(0.9);
            animation: modalSlideIn 0.3s ease-out forwards;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes modalSlideIn {
            to {
                transform: scale(1);
            }
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: #edfbed;
            color: #4CAF50;
            font-size: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 2px solid #4CAF50;
        }

        .modal-title {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .modal-text {
            font-family: sans-serif;
            color: #666;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: sans-serif;
            font-size: 14px;
        }

        .btn-dash {
            background: #4CAF50;
            color: white;
            flex: 1;
        }

        .btn-back {
            background: #f0f0f0;
            color: #555;
            flex: 1;
        }

        .modal-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        .error-shake {
            animation: shake 0.4s ease-in-out;
            border: 1px solid red !important;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left">
            <h1 class="login">LOGIN</h1><br>
            <p class="sub">How to i get started my identification ?</p>
            <input class="user" type="text" placeholder="username"><br><br>
            <input class="user" type="password" placeholder="password"><br><br>
            <button class="submit" type="submit"><a href="#">Login Now</a></button><button class="submit"
                type="submit"><a href="signup.html">Sign Up</a></button><br><br>
            <p class="down">Login</p>
            <p class="down1">with Others</p><br>
            <div class="pic1">
                <a href="#">
                    <p class="pic"></p>
                </a>
                <p class="down3"><a href="#">Login with</a></p>
                <p class="down4"><a href="#">google</a></p>
            </div>
        </div>
        <div class="right">
            <div class="img">
                <div class="innerimage">
                    <p class="righttext">Register to <br>access secure <br>goverment <br>services <br>through your
                        <br>verified digital <br>identity.
                    </p>
                </div>
                <div class="img1"></div>
            </div>
        </div>
    </div>
    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-body">
            <div class="success-icon">✔</div>
            <h2 class="modal-title">You are Logged In</h2>
            <p class="modal-text">Welcome back! You have successfully logged into your account.</p>
            <div class="modal-buttons">
                <button class="modal-btn btn-dash" onclick="window.location.href='home.html'">Go to Home</button>
                <button class="modal-btn btn-back" id="closeModal">Go Back</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.querySelector('.submit');
            const modal = document.getElementById('successModal');
            const closeBtn = document.getElementById('closeModal');
            const inputs = document.querySelectorAll('input');

            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                let isValid = true;

                inputs.forEach(input => {
                    if (!input.value.trim()) {
                        isValid = false;
                        input.classList.add('error-shake');
                        setTimeout(() => input.classList.remove('error-shake'), 400);
                    }
                });

                if (isValid) {
                    modal.style.display = 'flex';
                }
            });

            const closeModal = () => {
                modal.style.display = 'none';
            };

            closeBtn.addEventListener('click', closeModal);

            // Close on click outside
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            // Close on ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.style.display === 'flex') {
                    closeModal();
                }
            });
        });
    </script>
</body>

</html>
